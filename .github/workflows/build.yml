name: Android CI/CD

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Explicit Gradle cache on top of setup-java's built-in cache.
      # Caches the build-cache directory so incremental tasks are skipped.
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-*
          key: gradle-build-cache-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-build-cache-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # Build all variants in a single Gradle invocation so tasks share the
      # configuration phase, classpath resolution and incremental build cache.
      # --parallel  — lets Gradle run independent subproject tasks concurrently.
      # --build-cache — reuses outputs from previous runs stored above.
      # --no-daemon  — avoids daemon startup overhead inside the ephemeral runner.
      - name: Build all APKs
        run: >
          ./gradlew assembleDebug assembleRelease assembleNightly
          --parallel --build-cache --no-daemon --stacktrace
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs
        run: |
          # Rename output APKs from Gradle's default folder structure
          mv app/build/outputs/apk/github/debug/app-github-debug.apk app/build/outputs/apk/flow-debug.apk
          mv app/build/outputs/apk/github/release/app-github-release.apk app/build/outputs/apk/flow.apk
          mv app/build/outputs/apk/foss/release/app-foss-release.apk app/build/outputs/apk/flow-foss.apk
          mv app/build/outputs/apk/github/nightly/app-github-nightly.apk app/build/outputs/apk/flow-nightly.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-debug-apk
          path: app/build/outputs/apk/flow-debug.apk
          retention-days: 7

      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: flow-release-apks
          path: |
            app/build/outputs/apk/flow.apk
            app/build/outputs/apk/flow-foss.apk
          retention-days: 14

      - name: Upload Nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-nightly-apk
          path: app/build/outputs/apk/flow-nightly.apk
          retention-days: 14

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download pre-built APKs from the build job — no recompilation needed.
      - name: Download Release APKs
        uses: actions/download-artifact@v4
        with:
          name: flow-release-apks
          path: dist/

      - name: Download Nightly APK
        uses: actions/download-artifact@v4
        with:
          name: flow-nightly-apk
          path: dist/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Flow ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🎬 Flow - Release ${{ steps.get_version.outputs.VERSION }}

            ### 📱 Download
            Download the signed APK file below and install it on your Android device.

            ### ⚠️ Note
            This is a signed release APK. Install directly on your Android device.
            
            **Which version should I download?**
            - **flow.apk:** Standard version. Includes an in-app update checker to automatically notify you of new GitHub releases. (Recommended)
            - **flow-foss.apk:** Clean FOSS version. Strips out the update checker. Use this if you install the app via IzzyOnDroid, Obtainium, or F-Droid.

            ### 🆕 What's New
            <!-- Auto-generated changelog will appear here -->

            ### 📋 System Requirements
            - Android 5.0 (API 21) or higher
            - Minimum 2GB RAM recommended

          generate_release_notes: true
          files: |
            dist/flow.apk
            dist/flow-foss.apk
            dist/flow-nightly.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

