name: Android CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main, master, develop, agent/discord-rich-presence ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Explicit Gradle cache on top of setup-java's built-in cache.
      # Caches the build-cache directory so incremental tasks are skipped.
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-*
          key: gradle-build-cache-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-build-cache-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
          else
            echo "Release keystore secret is not available. Skipping decoding."
          fi

      - name: Run unit tests
        run: >
          ./gradlew :app:testGithubNightlyUnitTest :app:testFossReleaseUnitTest
          --parallel --build-cache --no-daemon --stacktrace

      - name: Lint GitHub nightly
        run: >
          ./gradlew :app:lintGithubNightly
          --build-cache --no-daemon --stacktrace

      # Build all variants in a single Gradle invocation so tasks share the
      # configuration phase, classpath resolution and incremental build cache.
      # --parallel  — lets Gradle run independent subproject tasks concurrently.
      # --build-cache — reuses outputs from previous runs stored above.
      # --no-daemon  — avoids daemon startup overhead inside the ephemeral runner.
      - name: Build all APKs
        run: >
          ./gradlew assembleGithubRelease assembleGithubNightly assembleFossRelease
          --parallel --build-cache --no-daemon --stacktrace
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify Discord nightly APK
        run: |
          test -f app/build/outputs/apk/github/nightly/app-github-nightly.apk
          sha256sum app/build/outputs/apk/github/nightly/app-github-nightly.apk | tee app/build/outputs/apk/github/nightly/app-github-nightly.apk.sha256

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-release-apk
          path: app/build/outputs/apk/github/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-discord-rpc-nightly-apk
          path: |
            app/build/outputs/apk/github/nightly/app-github-nightly.apk
            app/build/outputs/apk/github/nightly/app-github-nightly.apk.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload FOSS Release APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-foss-release-apk
          path: app/build/outputs/apk/foss/release/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download pre-built APKs from the build job — no recompilation needed.
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: flow-release-apk
          path: dist/

      - name: Download Nightly APK
        uses: actions/download-artifact@v4
        with:
          name: flow-discord-rpc-nightly-apk
          path: dist/

      - name: Download FOSS Release APK
        uses: actions/download-artifact@v4
        with:
          name: flow-foss-release-apk
          path: dist/

      - name: Rename APKs for release
        run: |
          mv dist/app-github-release.apk dist/flow.apk
          mv dist/app-github-nightly.apk dist/flow-nightly.apk
          mv dist/app-foss-release.apk dist/flow-foss.apk

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Flow ${{ steps.get_version.outputs.VERSION }}
          body: |
          
            FEATURES
            - Add new Proxy manager and routing #362
            - Add new App language selection in settings #376
            - Add text highlight and selection for comments and description #374
            - Zoom level indicator #348
            - Subtitle customization #348
            - Add playlist items re-ordering and video watch progress #380 #382
            - Add more data import options #396 #357 #424 #428
            - Add copy video title by long press #426
            - Add playlist video downloads confirmation dialog  #413
            - Add RYD disable option #433
            - Add background worker and notification disable option #411
            - Add new video player controls lock mode #441
            - Add toggle to refresh subscriptions at app startup #435
            - Add navigation tab order controls and default tab selection
            - Add comment and comment preview disable options
            - Add Material You dynamic color theme #448
            - Add custom light and dark theme choices for System Default #367
            - Add more app icon variants with updated adaptive icon packaging #400
            - Add shorts history #285
            - Add time based shorts auto scroll #398
            - Add block shorts from channels #285
            - Add new watch history search #393
            - Add new sorting options in playlists
            - Add new player seekbar width customization
            - Add remeber brightness toggle #474
            - Add new more lyrics providers (Based on Metrolist's provider implementation https://github.com/MetrolistGroup/Metrolist )
            - Add new lyrics engine (Based on Metrolist's ExperimentalLyrics.kt, LyricsLine.kt, LyricsCommon.kt, and FadingEdge.kt.)
            - Add new Music Audio Quality selector #521
            - Add external music downloads #256
