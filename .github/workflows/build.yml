name: Android CI/CD

on:
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew :app:testGithubNightlyUnitTest :app:testFossReleaseUnitTest --parallel --build-cache --no-daemon --stacktrace 2>&1 | tee tv-ci-diagnostic.txt

      - name: Upload compiler diagnostic
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tv-ci-diagnostic
          path: tv-ci-diagnostic.txt
          retention-days: 2

      - name: Fail after diagnostic upload
        if: steps.tests.outcome == 'failure'
        run: exit 1
