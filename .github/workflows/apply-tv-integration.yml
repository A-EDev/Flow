name: Apply TV integration patch

on:
  push:
    branches:
      - feat/android-tv-support

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply integration patch
        run: |
          base64 --decode .tv-bootstrap/integration.patch.gz.b64 | gzip --decompress > /tmp/tv-integration.patch
          git apply --check /tmp/tv-integration.patch
          git apply /tmp/tv-integration.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/AndroidManifest.xml app/src/main/java/io/github/aedev/flow/MainActivity.kt app/src/main/java/io/github/aedev/flow/ui/screens/settings/SettingsScreen.kt
          git commit -m "feat(tv): integrate TV runtime and settings"
          git push
