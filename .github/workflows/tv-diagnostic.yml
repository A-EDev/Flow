name: TV compile diagnostic

on:
  push:
    branches:
      - feat/android-tv-support

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Collect compiler errors
        run: |
          chmod +x gradlew
          ./gradlew testGithubDebugUnitTest testFossDebugUnitTest --stacktrace > /tmp/tv-build.log 2>&1 || true
          {
            grep -E '(^e: | error: |FAILURE:|What went wrong|Execution failed|Caused by:)' /tmp/tv-build.log || true
            echo
            echo '--- tail ---'
            tail -n 160 /tmp/tv-build.log
          } > tv-ci-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tv-ci-diagnostic.txt
          git commit -m "chore(tv): capture compile diagnostics"
          git push
